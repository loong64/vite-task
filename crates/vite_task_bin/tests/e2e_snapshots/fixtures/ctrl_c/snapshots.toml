[[e2e]]
name = "ctrl_c_terminates_running_tasks"
comment = """
Ctrl+C (SIGINT) on an uncached run should propagate to the running task and terminate it.
"""
steps = [
  { argv = [
    "vt",
    "run",
    "--no-cache",
    "@ctrl-c/a#dev",
  ], interactions = [
    { "expect-milestone" = "ready" },
    { "write-key" = "ctrl-c" },
  ] },
]

[[e2e]]
name = "ctrl_c_terminates_running_tasks__cached_"
comment = """
Same as above, but under the cached execution path (piped stdio + fspy tracking).
"""
steps = [
  { argv = [
    "vt",
    "run",
    "@ctrl-c/a#dev",
  ], interactions = [
    { "expect-milestone" = "ready" },
    { "write-key" = "ctrl-c" },
  ] },
]

[[e2e]]
name = "ctrl_c_prevents_future_tasks"
comment = """
Ctrl+C while running sequentially (b depends on a) should terminate a and prevent b from being scheduled.
"""
steps = [
  { argv = [
    "vt",
    "run",
    "-r",
    "--no-cache",
    "dev",
  ], interactions = [
    { "expect-milestone" = "ready" },
    { "write-key" = "ctrl-c" },
  ] },
]

[[e2e]]
name = "ctrl_c_prevents_caching"
comment = """
A task interrupted by Ctrl+C must not populate the cache, even if it happens to exit 0 — the following run should be a cache miss, not a hit.
"""
steps = [
  { argv = [
    "vt",
    "run",
    "@ctrl-c/a#dev",
  ], interactions = [
    { "expect-milestone" = "ready" },
    { "write-key" = "ctrl-c" },
  ], comment = "exits 0 but should not be cached" },
  { argv = [
    "vt",
    "run",
    "@ctrl-c/a#dev",
  ], interactions = [
    { "expect-milestone" = "ready" },
    { "write-key" = "ctrl-c" },
  ], comment = "should be cache miss, not hit" },
]
