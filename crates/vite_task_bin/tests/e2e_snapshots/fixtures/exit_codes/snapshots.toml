[[e2e]]
name = "single_task_failure_returns_task_exit_code"
comment = """
`vp run` should exit with the underlying task's exit code when a single task fails.
"""
steps = [{ argv = ["vt", "run", "pkg-a#fail"], comment = "exits with code 42" }]

[[e2e]]
name = "task_failure_fast_fails_remaining_tasks"
comment = """
A failing task under `-r` should fast-fail the run and skip any remaining packages.
"""
steps = [{ argv = ["vt", "run", "-r", "fail"], comment = "pkg-a fails, pkg-b is skipped" }]

[[e2e]]
name = "dependency_failure_fast_fails_dependents"
comment = """
When a dependency fails under `-t`, dependents should be skipped rather than run anyway.
"""
cwd = "packages/pkg-b"
steps = [{ argv = ["vt", "run", "-t", "check"], comment = "pkg-a fails, pkg-b is skipped" }]

[[e2e]]
name = "chained_command_with____stops_at_first_failure"
comment = """
In a `&&`-chained command, a non-zero exit from the first sub-command should short-circuit and skip the rest.
"""
steps = [
  { argv = [
    "vt",
    "run",
    "pkg-a#chained",
  ], comment = "first fails with exit code 3, second should not run" },
]
